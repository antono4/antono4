name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: antono4
          svg_path: output/github-contribution-grid-snake-dark.svg
      
      - name: Push to GitHub
        uses: EndBug/add-and-commit@v9
        with:
          add: output/
          message: "Generate snake animation"
